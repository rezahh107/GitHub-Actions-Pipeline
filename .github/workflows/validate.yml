name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repository-validation:
    name: repository-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python v5.6.0
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Generate CI detective report
        env:
          CI_SOURCE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          CI_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: python tools/ci_detective.py --repo-root . --out "$RUNNER_TEMP/ci_detective_report.json"

      - name: Write run summary
        run: |
          echo "## GitHub Actions Pipeline validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Unit tests completed." >> "$GITHUB_STEP_SUMMARY"
          echo "- Tested SHA: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source head SHA: \`${{ github.event.pull_request.head.sha || github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- CI detective report generated as an artifact." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI detective report
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-detective-report
          path: ${{ runner.temp }}/ci_detective_report.json
          retention-days: 14
          if-no-files-found: error
