name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repository-validation:
    name: repository-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python v5.6.0
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Compile Python modules
        run: python -m py_compile tools/*.py

      - name: Run unit tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests > "$RUNNER_TEMP/unit-tests.log" 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            cat "$RUNNER_TEMP/unit-tests.log"
          else
            echo "Unit tests failed. Showing the final 160 log lines; the complete log is uploaded as an artifact."
            tail -n 160 "$RUNNER_TEMP/unit-tests.log"
          fi
          exit "$status"

      - name: Upload unit test diagnostics
        if: always()
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unit-test-diagnostics
          path: ${{ runner.temp }}/unit-tests.log
          retention-days: 14
          if-no-files-found: error

      - name: Generate legacy CI detective report
        env:
          CI_SOURCE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          CI_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: python tools/ci_detective.py --repo-root . --out "$RUNNER_TEMP/ci_detective_report.json"

      - name: Generate Minimal Safe CI report
        run: |
          python tools/repository_upgrade.py \
            --repo-root . \
            --repository "${{ github.repository }}" \
            --mode minimal-safe-ci \
            --out "$RUNNER_TEMP/repository_upgrade.minimal.json"

      - name: Generate Deep Repository Upgrade report and implementation package
        run: |
          python tools/repository_upgrade.py \
            --repo-root . \
            --repository "${{ github.repository }}" \
            --mode deep-repository-upgrade \
            --out "$RUNNER_TEMP/repository_upgrade.deep.json" \
            --implementation-package-out "$RUNNER_TEMP/repository_upgrade.implementation-package.json"

      - name: Validate generated v1.1 reports
        run: |
          python tools/validate_repository_upgrade_report.py "$RUNNER_TEMP/repository_upgrade.minimal.json"
          python tools/validate_repository_upgrade_report.py "$RUNNER_TEMP/repository_upgrade.deep.json"

      - name: Check Scope Claim Audit examples
        run: |
          python tools/scope_claim_audit.py --check examples/scope_claim_audit.example.json
          python tools/scope_claim_audit.py --check examples/scope_claim_audit.true-negative.example.json
          python tools/scope_claim_audit.py --check examples/scope_claim_audit.ambiguous.example.json

      - name: Generate Scope Claim Audit summary
        run: python tools/scope_claim_audit.py --input examples/scope_claim_audit.example.json --out "$RUNNER_TEMP/scope_claim_audit.summary.md"

      - name: Write run summary and identity
        shell: bash
        env:
          TESTED_SHA: ${{ github.sha }}
          SOURCE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_IDENTITY_OUT: ${{ runner.temp }}/run-identity.json
        run: bash tools/render_workflow_summary.sh

      - name: Upload repository analysis reports
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: repository-analysis-reports
          path: |
            ${{ runner.temp }}/ci_detective_report.json
            ${{ runner.temp }}/repository_upgrade.minimal.json
            ${{ runner.temp }}/repository_upgrade.deep.json
            ${{ runner.temp }}/repository_upgrade.implementation-package.json
            ${{ runner.temp }}/run-identity.json
          retention-days: 14
          if-no-files-found: error

      - name: Upload Scope Claim Audit summary
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: scope-claim-audit-summary
          path: ${{ runner.temp }}/scope_claim_audit.summary.md
          retention-days: 14
          if-no-files-found: error
