name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-validation:
    name: repository-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Generate CI detective report
        run: python tools/ci_detective.py --repo-root . --out "$RUNNER_TEMP/ci_detective_report.json"

      - name: Write run summary
        run: |
          echo "## GitHub Actions Pipeline validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Unit tests completed." >> "$GITHUB_STEP_SUMMARY"
          echo "- CI detective report generated as an artifact." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI detective report
        uses: actions/upload-artifact@v4
        with:
          name: ci-detective-report
          path: ${{ runner.temp }}/ci_detective_report.json
          if-no-files-found: error
